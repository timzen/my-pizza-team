# .github/workflows/ci.yml — Continuous integration checks.
#
# Runs on PRs and pushes to main. Validates types and runs tests.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DENO_VERSION: '2.x'

jobs:
  check:
    name: Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Type check
        run: deno task check

      - name: Run tests
        run: deno task test
