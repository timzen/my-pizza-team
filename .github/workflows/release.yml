# .github/workflows/release.yml — Build and release cross-compiled binaries.
#
# Triggered on version tags (v*). Builds mpt binaries for all platforms,
# the macOS menu bar app, and creates a GitHub Release with artifacts.
#
# Targets:
#   - mpt-darwin-arm64  (macOS Apple Silicon)
#   - mpt-darwin-x64    (macOS Intel)
#   - mpt-linux-x64     (Linux x86_64)
#   - mpt-linux-arm64   (Linux ARM64)
#   - My Pizza Team.app (macOS menu bar app, arm64 + x64)

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DENO_VERSION: '2.x'
  NODE_VERSION: '20'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            deno-target: aarch64-apple-darwin
            os: macos-latest
          - target: darwin-x64
            deno-target: x86_64-apple-darwin
            os: macos-latest
          - target: linux-x64
            deno-target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: linux-arm64
            deno-target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: windows-x64
            deno-target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        shell: bash
        run: |
          cd ui
          npm ci
          npm run build

      - name: Compile binary
        shell: bash
        run: |
          deno compile \
            --allow-net --allow-read --allow-write --allow-env --allow-ffi --allow-run \
            --include ui/dist/ \
            --target ${{ matrix.deno-target }} \
            --output dist/mpt-${{ matrix.target }} \
            daemon/main.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpt-${{ matrix.target }}
          path: dist/mpt-${{ matrix.target }}*

  macos-app:
    name: Build macOS Menu Bar App (${{ matrix.arch }})
    runs-on: macos-latest
    needs: build
    strategy:
      matrix:
        include:
          - arch: arm64
            binary-artifact: mpt-darwin-arm64
          - arch: x64
            binary-artifact: mpt-darwin-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download mpt binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.binary-artifact }}
          path: dist/

      - name: Make binary executable
        run: chmod +x dist/${{ matrix.binary-artifact }}

      - name: Build SwiftUI menu bar app
        run: |
          cd desktop/macos
          swift build -c release

      - name: Package .app bundle
        run: |
          APP_DIR="dist/My Pizza Team.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"

          # Copy binaries
          cp desktop/macos/.build/release/MyPizzaTeamMenu "$APP_DIR/Contents/MacOS/MyPizzaTeamMenu"
          cp dist/${{ matrix.binary-artifact }} "$APP_DIR/Contents/MacOS/mpt"
          chmod +x "$APP_DIR/Contents/MacOS/MyPizzaTeamMenu"
          chmod +x "$APP_DIR/Contents/MacOS/mpt"

          # Copy icon
          cp desktop/macos/Resources/AppIcon.icns "$APP_DIR/Contents/Resources/AppIcon.icns"

          # Create Info.plist
          cat > "$APP_DIR/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>My Pizza Team</string>
            <key>CFBundleDisplayName</key>
            <string>My Pizza Team</string>
            <key>CFBundleIdentifier</key>
            <string>com.my-pizza-team.menubar</string>
            <key>CFBundleVersion</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleShortVersionString</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleExecutable</key>
            <string>MyPizzaTeamMenu</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Create zip archive
        run: |
          cd dist
          zip -r "My-Pizza-Team-macos-${{ matrix.arch }}.zip" "My Pizza Team.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-${{ matrix.arch }}
          path: dist/My-Pizza-Team-macos-${{ matrix.arch }}.zip

  windows-app:
    name: Package Windows Tray App
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download mpt binary
        uses: actions/download-artifact@v4
        with:
          name: mpt-windows-x64
          path: dist/

      - name: Package Windows app
        shell: pwsh
        run: |
          $outDir = "dist/My-Pizza-Team-windows"
          New-Item -ItemType Directory -Force -Path $outDir
          Copy-Item "dist/mpt-windows-x64.exe" "$outDir/mpt.exe"
          Copy-Item "desktop/windows/tray.ps1" "$outDir/tray.ps1"
          Copy-Item "desktop/windows/My Pizza Team.bat" "$outDir/My Pizza Team.bat"
          Copy-Item "desktop/windows/README.md" "$outDir/README.md"
          Compress-Archive -Path "$outDir/*" -DestinationPath "dist/My-Pizza-Team-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: dist/My-Pizza-Team-windows-x64.zip

  release:
    name: Create Release
    needs: [build, macos-app, windows-app]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          # Copy binaries
          for dir in artifacts/mpt-*/; do
            cp "$dir"* release/
          done
          # Copy macOS .app zips
          for dir in artifacts/macos-app-*/; do
            cp "$dir"* release/
          done
          # Copy Windows app zip
          if [ -d artifacts/windows-app ]; then
            cp artifacts/windows-app/* release/
          fi
          # Make binaries executable
          chmod +x release/mpt-* 2>/dev/null || true
          # Generate checksums
          cd release
          sha256sum * > checksums.sha256 2>/dev/null || shasum -a 256 * > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
