# .github/workflows/release.yml — Build and release cross-compiled binaries.
#
# Triggered on version tags (v*). Builds mpt binaries for all platforms,
# the macOS menu bar app, and creates a GitHub Release with artifacts.
#
# Targets:
#   - mpt-darwin-arm64  (macOS Apple Silicon, signed)
#   - mpt-linux-x64     (Linux x86_64)
#   - mpt-linux-arm64   (Linux ARM64)
#   - My Pizza Team.dmg (macOS menu bar app, arm64 only — lipo breaks Deno V8)

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DENO_VERSION: '2.x'
  NODE_VERSION: '20'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            deno-target: aarch64-apple-darwin
            os: macos-latest
          - target: linux-x64
            deno-target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: linux-arm64
            deno-target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: windows-x64
            deno-target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        shell: bash
        run: |
          cd ui
          npm ci
          npm run build

      - name: Compile binary
        shell: bash
        run: |
          deno compile \
            --allow-net --allow-read --allow-write --allow-env --allow-ffi --allow-run \
            --include ui/dist/ \
            --target ${{ matrix.deno-target }} \
            --output dist/mpt-${{ matrix.target }} \
            main.ts

      - name: Sign macOS binary
        if: runner.os == 'macOS' && env.P12_BASE64 != ''
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          MPT_SIGNATURE: ${{ secrets.MPT_SIGNATURE }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          # V8 JIT requires allow-jit and allow-unsigned-executable-memory entitlements
          codesign --force --options runtime \
            --entitlements desktop/macos/Resources/mpt.entitlements \
            --sign "$MPT_SIGNATURE" dist/mpt-${{ matrix.target }}
          codesign --verify --strict dist/mpt-${{ matrix.target }}
          echo "✅ Binary signed with JIT entitlements"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpt-${{ matrix.target }}
          path: dist/mpt-${{ matrix.target }}*

  macos-app:
    name: Build macOS Menu Bar App
    runs-on: macos-latest
    needs: build
    env:
      HAS_SIGNING_CERT: ${{ secrets.APPLE_CERTIFICATE_P12 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: mpt-darwin-arm64
          path: dist/

      - name: Use arm64 mpt binary (lipo breaks Deno V8 memory mapping)
        run: |
          chmod +x dist/mpt-darwin-arm64
          cp dist/mpt-darwin-arm64 dist/mpt
          file dist/mpt

      - name: Build SwiftUI menu bar app
        run: |
          cd desktop/macos
          swift build -c release --arch arm64

      - name: Package .app bundle
        run: |
          APP_DIR="dist/My Pizza Team.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"

          # Copy binaries
          cp desktop/macos/.build/release/MyPizzaTeamMenu "$APP_DIR/Contents/MacOS/MyPizzaTeamMenu"
          cp dist/mpt "$APP_DIR/Contents/MacOS/mpt"
          chmod +x "$APP_DIR/Contents/MacOS/MyPizzaTeamMenu"
          chmod +x "$APP_DIR/Contents/MacOS/mpt"

          # Copy icon
          cp desktop/macos/Resources/AppIcon.icns "$APP_DIR/Contents/Resources/AppIcon.icns"

          # Create Info.plist
          cat > "$APP_DIR/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>My Pizza Team</string>
            <key>CFBundleDisplayName</key>
            <string>My Pizza Team</string>
            <key>CFBundleIdentifier</key>
            <string>com.my-pizza-team.menubar</string>
            <key>CFBundleVersion</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleShortVersionString</key>
            <string>${GITHUB_REF_NAME#v}</string>
            <key>CFBundleExecutable</key>
            <string>MyPizzaTeamMenu</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Install Apple signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$P12_BASE64" ]; then
            echo "No signing certificate configured — using ad-hoc signing"
            # mpt needs JIT entitlements even with ad-hoc signing
            codesign --force --options runtime \
              --entitlements desktop/macos/Resources/mpt.entitlements \
              --sign - "dist/My Pizza Team.app/Contents/MacOS/mpt"
            codesign --force --sign - "dist/My Pizza Team.app/Contents/MacOS/MyPizzaTeamMenu"
            codesign --force --sign - "dist/My Pizza Team.app"
            exit 0
          fi
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

      - name: Sign the app with Developer ID
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          MPT_SIGNATURE: ${{ secrets.MPT_SIGNATURE }}
        run: |
          # Sign inner binaries first (inside-out), then the bundle
          # --deep is unreliable; explicit per-binary signing is required
          # mpt needs JIT entitlements for V8 engine memory mapping
          codesign --force --options runtime \
            --entitlements desktop/macos/Resources/mpt.entitlements \
            --sign "$MPT_SIGNATURE" \
            "dist/My Pizza Team.app/Contents/MacOS/mpt"
          codesign --force --options runtime \
            --sign "$MPT_SIGNATURE" \
            "dist/My Pizza Team.app/Contents/MacOS/MyPizzaTeamMenu"
          codesign --force --options runtime \
            --sign "$MPT_SIGNATURE" \
            "dist/My Pizza Team.app"

          # Verify
          codesign --verify --deep --strict "dist/My Pizza Team.app"
          echo "✅ Signature verified with JIT entitlements"

      - name: Free disk space before DMG
        run: |
          echo "Disk before cleanup:"
          df -h /
          # These are no longer needed at this point — the .app bundle already
          # contains its own copies. Reclaim the space so hdiutil has room.
          rm -rf desktop/macos/.build
          rm -f dist/mpt dist/mpt-darwin-arm64
          echo "Disk after cleanup:"
          df -h /

      - name: Create DMG
        run: |
          # Stage the DMG contents under RUNNER_TEMP (separate headroom from the
          # repo checkout) to avoid "No space left on device" on tight runners.
          STAGE="$RUNNER_TEMP/dmg-stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R "dist/My Pizza Team.app" "$STAGE/"
          # Create a symlink to /Applications for drag-and-drop install
          ln -s /Applications "$STAGE/Applications"

          # Create the DMG
          hdiutil create -volname "My Pizza Team" \
            -srcfolder "$STAGE" \
            -ov -format UDZO \
            "dist/My-Pizza-Team-macos-arm64.dmg"

          rm -rf "$STAGE"
          echo "✅ DMG created"

      - name: Notarize the DMG
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Submit the DMG directly for notarization
          xcrun notarytool submit "dist/My-Pizza-Team-macos-arm64.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 60m

          # Staple the notarization ticket to the DMG
          xcrun stapler staple "dist/My-Pizza-Team-macos-arm64.dmg"
          echo "✅ DMG notarized and stapled"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-arm64
          path: dist/My-Pizza-Team-macos-arm64.dmg

  windows-app:
    name: Package Windows Tray App
    runs-on: windows-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download mpt binary
        uses: actions/download-artifact@v4
        with:
          name: mpt-windows-x64
          path: dist/

      - name: Package Windows app
        shell: pwsh
        run: |
          $outDir = "dist/My-Pizza-Team-windows"
          New-Item -ItemType Directory -Force -Path $outDir
          Copy-Item "dist/mpt-windows-x64.exe" "$outDir/mpt.exe"
          Copy-Item "desktop/windows/tray.ps1" "$outDir/tray.ps1"
          Copy-Item "desktop/windows/My Pizza Team.bat" "$outDir/My Pizza Team.bat"
          Copy-Item "desktop/windows/README.md" "$outDir/README.md"
          Compress-Archive -Path "$outDir/*" -DestinationPath "dist/My-Pizza-Team-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: dist/My-Pizza-Team-windows-x64.zip

  release:
    name: Create Release
    needs: [build, macos-app, windows-app]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          # Copy binaries
          for dir in artifacts/mpt-*/; do
            cp "$dir"* release/
          done
          # Copy macOS arm64 .app dmg
          if [ -d artifacts/macos-app-arm64 ]; then
            cp artifacts/macos-app-arm64/* release/
          fi
          # Copy Windows app zip
          if [ -d artifacts/windows-app ]; then
            cp artifacts/windows-app/* release/
          fi
          # Make binaries executable
          chmod +x release/mpt-* 2>/dev/null || true
          # Generate checksums
          cd release
          sha256sum * > checksums.sha256 2>/dev/null || shasum -a 256 * > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*
