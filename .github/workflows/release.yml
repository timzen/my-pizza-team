# .github/workflows/release.yml — Build and release cross-compiled binaries.
#
# Triggered on version tags (v*). Builds mpt binaries for all platforms
# and creates a GitHub Release with the artifacts attached.
#
# Targets:
#   - mpt-darwin-arm64  (macOS Apple Silicon)
#   - mpt-darwin-x64    (macOS Intel)
#   - mpt-linux-x64     (Linux x86_64)
#   - mpt-linux-arm64   (Linux ARM64)

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DENO_VERSION: '2.x'
  NODE_VERSION: '20'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: darwin-arm64
            deno-target: aarch64-apple-darwin
            os: macos-latest
          - target: darwin-x64
            deno-target: x86_64-apple-darwin
            os: macos-latest
          - target: linux-x64
            deno-target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: linux-arm64
            deno-target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: |
          cd ui
          npm ci
          npm run build

      - name: Compile binary
        run: |
          deno compile \
            --allow-net --allow-read --allow-write --allow-env --allow-ffi --allow-run \
            --include ui/dist/ \
            --target ${{ matrix.deno-target }} \
            --output dist/mpt-${{ matrix.target }} \
            daemon/main.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpt-${{ matrix.target }}
          path: dist/mpt-${{ matrix.target }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release/
          for dir in artifacts/mpt-*/; do
            cp "$dir"* release/
          done
          # Make binaries executable
          chmod +x release/mpt-*
          # Generate checksums
          cd release
          sha256sum mpt-* > checksums.sha256 2>/dev/null || shasum -a 256 mpt-* > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/mpt-*
            release/checksums.sha256
